<!DOCTYPE html>
<html>
<head>
<title>Edit Event</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#eef;
}

.box{
background:white;
width:400px;
margin:auto;
margin-top:100px;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}
</style>

</head>

<body>

<div class="box">

<h2>Edit Event</h2>

<select id="eventList"></select><br><br>

<input type="text" id="newName" placeholder="New Event Name"><br><br>
<input type="date" id="newDate"><br><br>

<button onclick="editEvent()">Update Event</button>

</div>

<script>

let events=JSON.parse(localStorage.getItem("events")) || [];

let list=document.getElementById("eventList");

events.forEach((e,i)=>{
let option=document.createElement("option");
option.value=i;
option.text=e.name+" - "+e.date;
list.appendChild(option);
});

function editEvent(){

let index=list.value;

events[index].name=document.getElementById("newName").value;
events[index].date=document.getElementById("newDate").value;

localStorage.setItem("events",JSON.stringify(events));

alert("Event Updated");

location.reload();

}

</script>

</body>
</html>
